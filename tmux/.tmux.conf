# vim: ft=tmux foldmethod=marker :


# Plugins
set -g @plugin 'tmux-plugins/tmux-yank'


# Use Ctrl-a for prefix key
unbind C-b
set -g prefix C-a
bind C-a send-prefix


# Copy and Paste {{{ #
# Use vim keybindings in copy mode
setw -g mode-keys vi

# Bind c to new window
unbind c
bind-key c new-window -c '#{pane_current_path}'

# Setup 'v' to begin selection as in Vim
bind-key -t vi-copy v begin-selection
bind-key -t vi-copy y copy-pipe "reattach-to-user-namespace pbcopy"

# }}} Copy and Paste #

# Global Options {{{ #
# large history
set-option -g history-limit 10000

# colors
setw -g mode-bg colour238
set-option -g default-terminal "screen-256color" #"xterm-256color" # "screen-256color"
set-option -g pane-active-border-fg green

# utf8 support
set-window-option -g utf8 on

# basic settings
set-window-option -g xterm-keys on # for vim
set-window-option -g mode-keys vi # vi key
set-window-option -g monitor-activity on
set-window-option -g window-status-current-fg white
setw -g window-status-current-attr reverse

# Automatically set window title
setw -g automatic-rename

# Fix for rxct copy
set-option -ga terminal-override ',rxvt-uni*:XT:Ms=\E]52;%p1%s;%p2%s\007'

# use mouse
#setw -g mode-mouse on
#setw -g mouse-resize-pane on
#set -g mouse-select-window on
#set -g mouse-select-pane on
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# vi movement keys
set-option -g status-keys vi


bind-key a send-prefix # for nested tmux sessions

# }}} Global Options #

# Status Bar {{{ #
set-option -g status-utf8 on
set-option -g status-justify right
set-option -g status-bg colour16
set-option -g status-fg colour152
set-option -g status-interval 5
set-option -g status-left-length 30
set-option -g status-left '#[fg=magenta] #[fg=blue,bold]#T#[default]'
set-option -g status-right '#[fg=blue,bold]###S #[fg=magenta]%R %Y-%m-%d#[default]'
set-option -g visual-activity on
set-option -sg escape-time 0

# Titles (window number, program name, active (or not)
set-option -g set-titles on
set-option -g set-titles-string '#H:#S.#I.#P #W #T'
# }}} Status Bar #

# Unbindings {{{ #
#unbind [ # copy mode bound to escape key
unbind j
unbind C-b # unbind default leader key
unbind '"' # unbind horizontal split
unbind %   # unbind vertical split
# }}} Unbindings #

# Bindings {{{ #
# reload tmux conf
bind-key r source-file ~/.tmux.conf

#bind Escape copy-mode

# new split in current pane (horizontal / vertical)
bind-key - split-window -v # split pane horizontally
bind-key \ split-window -h # split pane vertically

# list panes
bind-key Space list-panes

# break-pane
bind-key Enter break-pane

# join-pane [-dhv] [-l size | -p percentage] [-s src-pane]
# [-t:dst-window.dst-pane] (destination window (dot) destination pane
#                (alias: joinp)
#
#bind C-j command-prompt "joinp"
#bind C-j command-prompt "join-pane"
#bind-key j command-prompt "join-pane -s '%%'"
#bind-key j command-prompt "joinp -t:0"
bind-key Space command-prompt "joinp -t:%%" # %% = prompt for window.pane [-V|H] # vert|hor split

#previous pane
bind-key -n C-up prev
bind-key -n C-left prev

#next pane
bind-key -n C-right next
bind-key -n C-down next
# }}} Bindings #

# Windows {{{ #
set-window-option -g window-status-current-bg red
set-window-option -g window-status-current-fg colour152
bind C-j previous-window
bind C-k next-window
bind-key C-a last-window # C-a C-a for last active window
bind A command-prompt "rename-window %%"
# By default, all windows in a session are constrained to the size of the
# smallest client connected to that session,
# even if both clients are looking at different windows.
# It seems that in this particular case, Screen has the better default
# where a window is only constrained in size if a smaller client
# is actively looking at it.
setw -g aggressive-resize on
# }}} Windows #

# Panes {{{ #
# Navigation ---------------------------------------------------------------
# use the vim motion keys to move between panes
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Resizing ---------------------------------------------------------------
bind-key C-h resize-pane -L
bind-key C-j resize-pane -D
bind-key C-k resize-pane -U
bind-key C-l resize-pane -R

# use vim motion keys while in copy mode
setw -g mode-keys vi
# }}} Panes #

# Layouts {{{ #
bind o select-layout "active-only"
bind M-- select-layout "even-vertical"
bind M-| select-layout "even-horizontal"
bind M-r rotate-window


# focus on first window
# select-window -t 0
# }}} Layouts #
